name: iOS

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate project
        run: xcodegen generate

      - name: Test
        run: |
          set -euo pipefail
          SIM_NAME=$(xcrun simctl list devices available -j | ruby -rjson -e 'devices = JSON.parse($stdin.read)["devices"].values.flatten; sim = devices.find { |d| d["isAvailable"] && d["name"].include?("iPhone") }; abort("No available iPhone simulator") unless sim; puts sim["name"]')
          xcodebuild \
            -project WorkPhotoOrganizer.xcodeproj \
            -scheme WorkPhotoOrganizer \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${SIM_NAME},OS=latest" \
            test
