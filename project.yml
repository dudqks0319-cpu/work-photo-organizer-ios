name: WorkPhotoOrganizer
options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  WorkPhotoOrganizer:
    type: application
    platform: iOS
    sources:
      - WorkPhotoOrganizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.workphotoorganizer
        INFOPLIST_FILE: WorkPhotoOrganizer/Info.plist
        INFOPLIST_OUTPUT_FORMAT: xml
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - WorkPhotoOrganizerTests
  WorkPhotoOrganizerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WorkPhotoOrganizerTests
    dependencies:
      - target: WorkPhotoOrganizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.workphotoorganizer.tests
        INFOPLIST_FILE: WorkPhotoOrganizerTests/Info.plist
